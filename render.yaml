# Render Blueprint configuration for Placement Coordinator Agent
# Deploy this project by going to dashboard.render.com -> New -> Blueprint

databases:
  - name: placement-db
    plan: free # Deploys a free PostgreSQL database (active for 90 days)

services:
  # Backend API service (FastAPI)
  - type: web
    name: placement-coordinator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Start command runs the migrations (auto-created via Base.metadata.create_all in main.py),
    # seeds default data if the database is empty, and starts the uvicorn server on the port assigned by Render.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12 # Ensure python version compatibility

  # Frontend static site (React / Vite)
  - type: web
    name: placement-coordinator-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Connects the frontend to the backend API automatically using Render service discovery
      - key: VITE_API_URL
        fromService:
          type: web
          name: placement-coordinator-api
          property: host
